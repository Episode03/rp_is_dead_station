author: DuLL-FoX
delete-after: true
changes:
  - rscadd: Теперь в качестве хедшота персонажа можно использовать GIF, WebM и MP4
      - видео проигрывается автоматически в цикле без звука.
  - qol: Убран whitelist хостов для ссылок на хедшоты. Теперь подойдёт любая прямая
      http(s)-ссылка - главное, чтобы она заканчивалась на .jpg/.jpeg/.png/.gif/.webm/.mp4
      (в любом регистре).
  - bugfix: Превью MP4/WebM-хедшотов в окне создания персонажа теперь отображается
      корректно, а не ломается из-за `<img>`.
